[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"

[project]
name = "llama-studio-shared-schema"
version = "2.0.0"
description = "Shared Pydantic schema for Llama Studio (source of truth for TS types)."
requires-python = ">=3.11"
license = { text = "MIT" }
dependencies = ["pydantic>=2.9"]

[tool.hatch.build.targets.wheel]
packages = ["shared_schema"]
