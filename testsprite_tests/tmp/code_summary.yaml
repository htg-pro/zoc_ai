version: "2"
type: frontend
tech_stack:
  - TypeScript
  - React 18
  - Vite 5
  - Tailwind CSS 3
  - Radix UI primitives
  - Zustand state management
  - Monaco Editor
  - xterm.js terminal
  - Tauri 2 (desktop shell)
  - FastAPI agent sidecar (Python backend, OpenAI-compatible bridge for Groq / OpenAI / Gemini / xAI / Anthropic)
routes:
  - path: /
    file: src/App.tsx
    auth_required: false
    description: Single-page Zoc Studio desktop shell with activity bar, side panel, agent panel, bottom dock, and Settings overlay
features:
  - name: Settings -> Providers -> Groq BYOK key flow
    description: |
      In Settings, the Providers section lists built-in providers including Groq (baseUrl https://api.groq.com/openai/v1).
      The tester must:
        1) Open Settings (gear icon in the activity bar).
        2) Switch to the "Providers" tab/section.
        3) Find the Groq card.
        4) Click "Edit" or expand the Groq card to reveal the API key field.
        5) Paste the Groq API key into the key field.
        6) Click the "Save" or "Discover models" button.
        7) Confirm a non-empty list of Groq models appears (e.g. llama-3.3-70b-versatile, llama-3.1-8b-instant).
        8) Mark Groq as the active provider if a Set-Active / Select control is shown.
      Test API key (test-only, will be rotated after run): REDACTED_GROQ_KEY_ROTATE_ME
    files:
      - src/features/settings/SettingsView.tsx
      - src/features/settings/sections/Providers.tsx
      - src/lib/providers.ts
      - src/lib/agent-client.ts
    entry_route: /
    user_interactions:
      - Click the Settings icon in the activity bar
      - Click the "Providers" tab
      - Locate the Groq provider card
      - Click "Edit" on the Groq card
      - Paste the Groq API key (REDACTED_GROQ_KEY_ROTATE_ME) into the API key input
      - Click "Discover models" / "Save"
      - Verify the model list updates with real Groq models
    api_calls:
      - method: POST
        endpoint: /v1/providers/discover-models
        body: '{"base_url":"https://api.groq.com/openai/v1","api_key":"<groq-key>"}'
    auth_required: false
  - name: Model picker / switcher in Agent panel
    description: |
      The Agent panel header has a Model picker dropdown. After saving the Groq key in Settings,
      open the picker, pick a Groq model (e.g. llama-3.3-70b-versatile), and confirm the active
      model label updates. Also verify "local model" path: pick the llama.cpp / Local entry and
      confirm the badge shows loading/loaded/error appropriately.
    files:
      - src/features/agent/ModelPicker.tsx
      - src/lib/store.ts
    entry_route: /
    user_interactions:
      - Click the model picker dropdown button at the top of the Agent panel
      - Select a Groq model (e.g. "Llama 3.3 70B Versatile")
      - Confirm the picker collapses and the active model badge shows the chosen model
      - Re-open the picker, select a Local (llama.cpp) model
      - Confirm a loading/loaded/error badge is rendered
    api_calls: []
    auth_required: false
  - name: Agent chat panel - send prompt, observe Claude-Code / Cursor-style streamed output
    description: |
      Send a prompt in the Agent panel composer. With a real provider (Groq) configured the
      assistant message should stream tokens into the timeline. The UI should render tool call
      cards (ToolCallCard.tsx) and diff cards (DiffCard.tsx) where applicable, similar to the
      Cursor / Claude-Code experience. If the sidecar is unreachable the UI falls back to a
      mock reply -- the test should treat the literal text "Mock response" or "agent sidecar not
      reachable" as a failure signal for the live-streaming assertion.
    files:
      - src/features/agent/AgentPanel.tsx
      - src/features/agent/AgentTimeline.tsx
      - src/features/agent/Composer.tsx
      - src/features/agent/MessageItem.tsx
      - src/features/agent/ToolCallCard.tsx
      - src/features/agent/DiffCard.tsx
      - src/features/agent/AttachmentChips.tsx
      - src/features/agent/SlashAutocomplete.tsx
      - src/features/agent/AgentEmptyState.tsx
      - src/lib/agent-client.ts
    entry_route: /
    user_interactions:
      - Type a coding-related prompt into the composer text area (e.g. "Explain the agent run flow")
      - Press Send (or Enter)
      - Confirm the user bubble appears in the timeline
      - Confirm an assistant bubble appears and tokens stream into it character by character
      - Confirm the text does NOT contain "Mock response" / "agent sidecar not reachable"
      - If a tool-call card appears, click the expand chevron and confirm tool input/output renders
      - Confirm the run lifecycle badge moves from "running" to "completed" / "awaiting review"
      - Click the Stop button on a long-running run and confirm the streaming halts
    api_calls:
      - method: POST
        endpoint: /v1/sessions
      - method: POST
        endpoint: /v1/sessions/{session_id}/agent/run
      - method: GET
        endpoint: /v1/sessions/{session_id}/agent/events
    auth_required: false
  - name: Every button in the main shell
    description: |
      Walk through every button / icon in the activity bar, top bar, agent header, composer,
      bottom dock, and Settings page. For each button: click it, confirm the expected panel /
      dialog / state change is visible, and no console / UI error appears.
    files:
      - src/components/layout/Shell.tsx
      - src/components/layout/ActivityBar.tsx
      - src/components/layout/TopBar.tsx
      - src/components/layout/SidePanel.tsx
      - src/components/layout/BottomDock.tsx
      - src/features/agent/AgentMenu.tsx
      - src/features/agent/Composer.tsx
      - src/features/agent/ModelPicker.tsx
      - src/features/agent/ContextBar.tsx
      - src/features/sessions/SessionsPanel.tsx
      - src/features/settings/SettingsView.tsx
    entry_route: /
    user_interactions:
      - Click each activity-bar icon and confirm the side panel content switches
      - Click the top-bar buttons (settings gear, command-palette trigger, etc.)
      - Click the agent header buttons (model picker, agent menu, new session, clear, stop)
      - Click composer buttons (attach, slash trigger, send, stop)
      - Click bottom-dock tabs (terminal, problems, output, etc.)
      - Click every action in the Settings sections (save, reset, discover, edit, delete, add)
    api_calls: []
    auth_required: false
  - name: Sessions panel
    description: Create / list / switch / rename / delete chat sessions.
    files:
      - src/features/sessions/SessionsPanel.tsx
      - src/features/sessions/SessionsView.tsx
    entry_route: /
    user_interactions:
      - Click Sessions icon in the activity bar
      - Click New Session
      - Click an existing session row to switch
      - Use the row context menu to rename and to delete
    api_calls:
      - method: GET
        endpoint: /v1/sessions
      - method: POST
        endpoint: /v1/sessions
      - method: DELETE
        endpoint: /v1/sessions/{session_id}
    auth_required: false
  - name: Onboarding wizard
    description: First-run wizard for workspace selection.
    files:
      - src/features/onboarding/OnboardingWizard.tsx
    entry_route: /
    user_interactions:
      - On first launch, choose a workspace folder and click Finish
    api_calls: []
    auth_required: false
known_limitations:
  - issue: Frontend is a Tauri desktop shell -- in a plain browser, some bridge APIs (file dialog, real filesystem) return stubs
    location: src/lib/tauri-bridge.ts
    impact: Workspace folder selection in onboarding falls back to a stub picker; the rest of the UI still works
  - issue: Agent silently falls back to mock responses when the FastAPI sidecar is unreachable
    location: src/lib/agent-client.ts
    impact: Tests must explicitly assert the response is NOT the mock string to verify real streaming
  - issue: Backend's OpenAIProvider is hard-wired to base_url https://api.openai.com/v1 with a static catalogue
    location: services/agent/src/zoc_studio_agent/providers/openai.py
    impact: |
      A real Groq run requires the OpenAIProvider's base_url to be overridable per-session. The Settings
      Discover-Models flow still works (it accepts a base_url in the request body), but the actual
      streamed agent run via /v1/sessions/{id}/agent/run will return
      "model <groq-id> not found on provider openai" unless this is fixed.
